const inputEl = document.getElementById("carInput");
const statusEl = document.getElementById("status");
const tableEl = document.getElementById("resultTable");
const tbodyEl = tableEl.querySelector("tbody");
const searchBtn = document.getElementById("searchBtn");
const voiceBtn = document.getElementById("voiceBtn");

let lastActionWasSearch = false;

function sanitizeInput() {
  inputEl.value = inputEl.value.replace(/[^0-9]/g, "").slice(0, 4);
}

function clearSearch() {
  inputEl.value = "";
  statusEl.innerText = "";
  tbodyEl.innerHTML = "";
  tableEl.style.display = "none";
  lastActionWasSearch = false;
  inputEl.focus();
}

function renderCar(car) {
  statusEl.innerText = "✅ 차량 확인 완료";
  tableEl.style.display = "table";
  tbodyEl.innerHTML = `
    <tr>
      <td>
        <img src="${car.사진 || 'images/default.jpg'}"
             class="car-photo"
             onclick="window.open(this.src)">
      </td>
      <td>${car.번호}</td>
      <td>${car.색상}</td>
      <td>${car.차종}</td>
      <td>${car.주차스티커}</td>
    </tr>
  `;
}

function runSearch() {
  sanitizeInput();
  const input = inputEl.value.trim();

  tbodyEl.innerHTML = "";
  tableEl.style.display = "none";

  if (input.length !== 4) {
    statusEl.innerText = "⚠ 4자리 번호를 입력하세요";
    lastActionWasSearch = true;
    inputEl.focus();
    return;
  }

  const car = carData.find(c => c.번호 === input);

  if (!car) {
    statusEl.innerText = "❌ 등록되지 않은 차량입니다";
    lastActionWasSearch = true;
    inputEl.focus();
    return;
  }

  renderCar(car);
  lastActionWasSearch = true;
}

function handleSearchClick() {
  if (lastActionWasSearch) {
    clearSearch();
    return;
  }
  runSearch();
}

function startVoiceRecognition() {
  if (!("webkitSpeechRecognition" in window)) {
    alert("이 브라우저는 음성인식을 지원하지 않습니다");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "ko-KR";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    const number = text.replace(/[^0-9]/g, "").slice(-4);
    inputEl.value = number;
    runSearch();
  };

  recognition.onerror = function() {
    statusEl.innerText = "⚠ 음성 인식에 실패했습니다. 다시 시도해 주세요";
  };

  recognition.start();
}

function handleVoiceClick() {
  if (lastActionWasSearch) {
    clearSearch();
    return;
  }
  startVoiceRecognition();
}

searchBtn.addEventListener("click", handleSearchClick);
voiceBtn.addEventListener("click", handleVoiceClick);
inputEl.addEventListener("input", sanitizeInput);
inputEl.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    handleSearchClick();
  }
});
</script>
